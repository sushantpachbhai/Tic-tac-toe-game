<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="mysolution.css">
</head>
<body>
    <div class="nav-content">
        <nav class="navbar">
            <ul>
                <li>My Tic Tac Toe Responsive WebGame</li>
            </ul>
        </nav>
    </div>
    <div class="game-content">
        <div class="game">
            <!-- <div class="line"></div> -->
            <div class="box bl-0 bt-0"><span class="box-content"></span></div>
            <div class="box bt-0"><span class="box-content"></span></div>
            <div class="box bt-0 br-0"><span class="box-content"></span></div>
            <div class="box bl-0"><span class="box-content"></span></div>
            <div class="box"><span class="box-content"></span></div>
            <div class="box br-0"><span class="box-content"></span></div>
            <div class="box bl-0 bb-0"><span class="box-content"></span></div>
            <div class="box bb-0"><span class="box-content"></span></div>
            <div class="box br-0 bb-0"><span class="box-content"></span></div>
        </div>
        <div class="game-info">
            <h3>Welcome To My Tic Tac Toe Game</h3>
            <div class="info-set">
                <span class="set-turn">Turn of X</span>
                <button id="reset-btn">Reset</button>
            </div>
            <div class="win-img">
                <img src="../images/excited.gif" alt="win-img" id="winimg">
            </div>
        </div>
    </div>

    <script src="mysolution.js"></script>
</body>
</html>
